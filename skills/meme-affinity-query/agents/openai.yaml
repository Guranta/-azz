interface:
  display_name: "Meme Affinity Query"
  short_description: "BSC meme token analysis and trading: analyze, bind, approve, buy, sell"
  default_prompt: "Use $meme-affinity-query to handle BSC token operations. Five instructions: (1) analyze <token> — call POST /api/score-token, return compact CZ/smartmoney summary with link. No binding required. (2) bind <bindingCode> — call POST /api/trade/bind, save bindingCode (小龙虾 ID) in session. (3) approve <token> — requires active binding, ask user to confirm, then call POST /api/trade/approve with bindingCode. (4) buy <token> <amount> <baseToken> — requires active binding, ask user to confirm amount/slip, then call POST /api/trade/swap side=buy with bindingCode. (5) sell <token> <amount> <baseToken> — same as buy with side=sell, token must be approved first. Never execute approve/buy/sell without user saying exact '确认'. Keep all scoring and AVE logic on the website side. BSC only. No browser wallet."
