interface:
  display_name: "Meme Affinity Query"
  short_description: "BSC meme token analysis and trading: analyze, approve, buy, sell"
  default_prompt: "Use $meme-affinity-query to handle BSC token operations. Supports four instructions: (1) analyze <token> — call POST /api/score-token, return compact CZ/smartmoney/address summary with result link. (2) approve <token> — requires assetsId and explicit user confirmation, then call POST /api/trade/approve. (3) buy <token> <amount> <baseToken> — requires assetsId and explicit user confirmation, then call POST /api/trade/swap with side=buy. (4) sell <token> <amount> <baseToken> — requires assetsId and explicit user confirmation, then call POST /api/trade/swap with side=sell. If user has no assetsId, tell them to create a wallet on the website first. Never execute approve/buy/sell without user saying '确认'. Keep all scoring and AVE logic on the website side. BSC only. No browser wallet."
